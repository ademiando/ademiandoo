<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Donut Maker - Pro Version</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        
        /* Mengatur ketebalan irisan donat agar terlihat premium */
        path.slice {
            transition: opacity 0.3s ease, transform 0.3s ease;
            stroke: #fff;
            stroke-width: 2px;
        }
        
        path.slice:hover {
            opacity: 0.85;
            cursor: pointer;
        }

        /* Styling garis penunjuk agar tidak kaku */
        polyline {
            fill: none;
            stroke: #94a3b8;
            stroke-width: 1.5px;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Custom Scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Mencegah input angka meluap */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .chart-container {
            filter: drop-shadow(0 20px 25px rgb(0 0 0 / 0.1));
        }

        /* Animasi dropdown */
        #search-results {
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row h-screen">

    <!-- PANEL KONTROL (Kiri) -->
    <aside class="w-full lg:w-[420px] bg-white border-r border-slate-200 flex flex-col h-full z-30 shadow-2xl lg:shadow-none">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Portfolio Donut</h1>
                <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">Asset Allocation Creator</p>
            </div>
            <button onclick="document.getElementById('file-input').click()" class="bg-blue-50 p-2 rounded-full text-blue-600 hover:bg-blue-100 transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </button>
        </div>

        <!-- SEARCH AREA -->
        <div class="p-4 bg-slate-50/50 border-b border-slate-100 relative">
            <div class="relative">
                <input type="text" id="search-input" 
                    class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 outline-none transition shadow-sm"
                    placeholder="Cari Saham (BBCA, AAPL, BTC)..." autocomplete="off">
                <svg class="absolute left-3.5 top-3.5 text-slate-400 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                
                <div id="search-results" class="hidden absolute top-full left-0 right-0 mt-2 bg-white border border-slate-200 rounded-xl shadow-2xl max-h-64 overflow-y-auto z-50 p-2">
                    <!-- Hasil cari di sini -->
                </div>
            </div>
        </div>

        <!-- LIST EDITOR -->
        <div class="flex-1 overflow-y-auto p-4 custom-scroll" id="asset-list">
            <!-- Items injected by JS -->
        </div>

        <!-- BUTTONS -->
        <div class="p-4 bg-slate-50 border-t border-slate-100 grid grid-cols-2 gap-3">
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleImageUpload(event)">
            <button onclick="resetData()" class="px-4 py-3 bg-white border border-slate-200 text-slate-600 rounded-xl text-sm font-semibold hover:bg-slate-100 transition shadow-sm">Reset</button>
            <button onclick="downloadChart()" class="px-4 py-3 bg-blue-600 text-white rounded-xl text-sm font-semibold hover:bg-blue-700 transition shadow-sm">Simpan</button>
        </div>
    </aside>

    <!-- AREA PREVIEW (Kanan) -->
    <main class="flex-1 relative flex items-center justify-center p-4 md:p-12 overflow-hidden bg-slate-100">
        <!-- Dekorasi Background -->
        <div class="absolute inset-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#64748b 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
        
        <div class="relative w-full max-w-[850px] aspect-[4/3] bg-white rounded-[2.5rem] shadow-2xl flex items-center justify-center border border-white overflow-hidden chart-container">
            
            <!-- Judul Visual -->
            <div class="absolute top-10 left-10 hidden md:block">
                <p class="text-[10px] font-bold text-blue-600 uppercase tracking-[0.3em] mb-1">Live Preview</p>
                <h2 class="text-xl font-bold text-slate-900">Portfolio Breakdown</h2>
            </div>

            <!-- SVG DONUT -->
            <svg id="donut-svg" viewBox="0 0 800 600" class="w-full h-full overflow-visible"></svg>

            <!-- PROFILE PHOTO (Tengah) -->
            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 pointer-events-none">
                <!-- Outer Ring -->
                <div class="w-[150px] h-[150px] md:w-[190px] md:h-[190px] rounded-full bg-white p-1 shadow-xl flex items-center justify-center">
                    <!-- Photo container -->
                    <div class="w-full h-full rounded-full overflow-hidden bg-slate-100 border border-slate-100">
                        <img id="profile-img" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Warren_Buffett_KU_Visit.jpg/800px-Warren_Buffett_KU_Visit.jpg" 
                             class="w-full h-full object-cover">
                    </div>
                </div>
            </div>

            <!-- Footer Stats -->
            <div class="absolute bottom-10 right-10 text-right hidden md:block">
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Calculated Precision</p>
                <p class="text-3xl font-black text-slate-900" id="total-val">100%</p>
            </div>
        </div>
    </main>

    <script>
        // Data Saham & Logo
        const tickerLibrary = [
            { s: "AAPL", n: "Apple Inc.", l: "https://logo.clearbit.com/apple.com", c: "#2FA4E7" },
            { s: "BBCA", n: "Bank BCA", l: "https://logo.clearbit.com/bca.co.id", c: "#003594" },
            { s: "BBRI", n: "Bank BRI", l: "https://logo.clearbit.com/bri.co.id", c: "#00529C" },
            { s: "TLKM", n: "Telkom Indonesia", l: "https://logo.clearbit.com/telkom.co.id", c: "#ED1C24" },
            { s: "ASII", n: "Astra International", l: "https://logo.clearbit.com/astra.co.id", c: "#005CAB" },
            { s: "TSLA", n: "Tesla, Inc.", l: "https://logo.clearbit.com/tesla.com", c: "#E31937" },
            { s: "GOOGL", n: "Alphabet Inc.", l: "https://logo.clearbit.com/abc.xyz", c: "#4285F4" },
            { s: "MSFT", n: "Microsoft Corp", l: "https://logo.clearbit.com/microsoft.com", c: "#00A4EF" },
            { s: "KO", n: "Coca-Cola", l: "https://logo.clearbit.com/coca-colacompany.com", c: "#F40009" },
            { s: "AXP", n: "American Express", l: "https://logo.clearbit.com/americanexpress.com", c: "#006fcf" },
            { s: "BAC", n: "Bank of America", l: "https://logo.clearbit.com/bankofamerica.com", c: "#004a99" },
            { s: "CVX", n: "Chevron", l: "https://logo.clearbit.com/chevron.com", c: "#005696" },
            { s: "OXY", n: "Occidental", l: "https://logo.clearbit.com/oxy.com", c: "#ee2e24" },
            { s: "BTC", n: "Bitcoin", l: "https://cryptologos.cc/logos/bitcoin-btc-logo.png", c: "#F7931A" },
            { s: "ETH", n: "Ethereum", l: "https://cryptologos.cc/logos/ethereum-eth-logo.png", c: "#627EEA" }
        ];

        let assets = [
            { s: "AAPL", v: 23, c: "#2FA4E7", l: "https://logo.clearbit.com/apple.com" },
            { s: "AXP", v: 19, c: "#7CB82F", l: "https://logo.clearbit.com/americanexpress.com" },
            { s: "BAC", v: 11, c: "#EBC91E", l: "https://logo.clearbit.com/bankofamerica.com" },
            { s: "KO", v: 10, c: "#E07B26", l: "https://logo.clearbit.com/coca-colacompany.com" },
            { s: "CVX", v: 7, c: "#DE3535", l: "https://logo.clearbit.com/chevron.com" },
            { s: "OXY", v: 5, c: "#8E56B6", l: "https://logo.clearbit.com/oxy.com" },
            { s: "OTHER", v: 25, c: "#45738F", l: "" }
        ];

        // UI & Logic
        const searchInput = document.getElementById('search-input');
        const searchResults = document.getElementById('search-results');

        function init() {
            renderList();
            drawChart();
            
            // Event Pencarian
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toUpperCase();
                if (term.length === 0) { searchResults.classList.add('hidden'); return; }
                
                const matches = tickerLibrary.filter(x => x.s.includes(term) || x.n.toUpperCase().includes(term));
                if (matches.length > 0) {
                    searchResults.innerHTML = matches.map(m => `
                        <div onclick='addAsset("${m.s}")' class="flex items-center gap-3 p-3 hover:bg-blue-50 cursor-pointer rounded-lg transition">
                            <img src="${m.l}" class="w-6 h-6 rounded-full border border-slate-100">
                            <div>
                                <div class="text-sm font-bold text-slate-800">${m.s}</div>
                                <div class="text-[10px] text-slate-400">${m.n}</div>
                            </div>
                        </div>
                    `).join('');
                    searchResults.classList.remove('hidden');
                } else {
                    searchResults.innerHTML = `<div onclick='addCustom("${term}")' class="p-3 text-sm text-slate-500 hover:bg-slate-50 cursor-pointer">Tambah "${term}" sebagai aset kustom</div>`;
                }
            });
        }

        function renderList() {
            const list = document.getElementById('asset-list');
            list.innerHTML = assets.map((a, i) => `
                <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm mb-3 transition hover:shadow-md group">
                    <div class="relative w-10 h-10 flex-shrink-0">
                        <div class="w-full h-full rounded-full border-2 border-white shadow-sm flex items-center justify-center overflow-hidden" style="background-color: ${a.c}">
                            ${a.l ? `<img src="${a.l}" class="w-6 h-6 object-contain">` : `<span class="text-[10px] font-bold text-white">${a.s[0]}</span>`}
                        </div>
                        <input type="color" value="${a.c}" oninput="updateAsset(${i}, 'c', this.value)" class="absolute inset-0 opacity-0 cursor-pointer">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-sm font-bold text-slate-700 uppercase">${a.s}</span>
                            <div class="flex items-center text-sm font-bold text-blue-600">
                                <input type="number" value="${a.v}" oninput="updateAsset(${i}, 'v', this.value)" class="w-8 bg-transparent text-right outline-none">
                                <span class="ml-0.5">%</span>
                            </div>
                        </div>
                        <input type="range" value="${a.v}" oninput="updateAsset(${i}, 'v', this.value)" class="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-blue-600">
                    </div>
                    <button onclick="removeAsset(${i})" class="text-slate-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">&times;</button>
                </div>
            `).join('');
        }

        function updateAsset(idx, key, val) {
            assets[idx][key] = key === 'v' ? (parseFloat(val) || 0) : val;
            drawChart();
            if (key === 'c') renderList(); // Update logo background color in list
        }

        function addAsset(ticker) {
            const match = tickerLibrary.find(x => x.s === ticker);
            assets.push({ s: match.s, v: 10, c: match.c, l: match.l });
            finishAdd();
        }

        function addCustom(ticker) {
            assets.push({ s: ticker, v: 10, c: "#94a3b8", l: "" });
            finishAdd();
        }

        function finishAdd() {
            searchInput.value = '';
            searchResults.classList.add('hidden');
            renderList();
            drawChart();
        }

        function removeAsset(i) {
            if (assets.length > 1) {
                assets.splice(i, 1);
                renderList();
                drawChart();
            }
        }

        function resetData() {
            assets = [
                { s: "AAPL", v: 23, c: "#2FA4E7", l: "https://logo.clearbit.com/apple.com" },
                { s: "AXP", v: 19, c: "#7CB82F", l: "https://logo.clearbit.com/americanexpress.com" },
                { s: "BAC", v: 11, c: "#EBC91E", l: "https://logo.clearbit.com/bankofamerica.com" },
                { s: "KO", v: 10, c: "#E07B26", l: "https://logo.clearbit.com/coca-colacompany.com" },
                { s: "CVX", v: 7, c: "#DE3535", l: "https://logo.clearbit.com/chevron.com" },
                { s: "OXY", v: 5, c: "#8E56B6", l: "https://logo.clearbit.com/oxy.com" },
                { s: "OTHER", v: 25, c: "#45738F", l: "" }
            ];
            renderList();
            drawChart();
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => document.getElementById('profile-img').src = ev.target.result;
                reader.readAsDataURL(file);
            }
        }

        // --- MATH & DRAWING (SVG) ---
        function drawChart() {
            const svg = document.getElementById('donut-svg');
            svg.innerHTML = '';
            
            const total = assets.reduce((sum, a) => sum + a.v, 0);
            document.getElementById('total-val').innerText = (total > 0 ? Math.round(total) : 0) + "%";

            const cx = 400, cy = 300;
            const radius = 220;
            const innerRadius = 115; // Ketebalan Donut diatur di sini (Donut Tebal)
            
            let currentAngle = -Math.PI / 2;

            assets.forEach((asset, i) => {
                const sliceAngle = (asset.v / total) * 2 * Math.PI;
                const midAngle = currentAngle + (sliceAngle / 2);
                
                // Draw Slice
                const x1 = cx + radius * Math.cos(currentAngle);
                const y1 = cy + radius * Math.sin(currentAngle);
                const x2 = cx + radius * Math.cos(currentAngle + sliceAngle);
                const y2 = cy + radius * Math.sin(currentAngle + sliceAngle);
                
                const ix1 = cx + innerRadius * Math.cos(currentAngle);
                const iy1 = cy + innerRadius * Math.sin(currentAngle);
                const ix2 = cx + innerRadius * Math.cos(currentAngle + sliceAngle);
                const iy2 = cy + innerRadius * Math.sin(currentAngle + sliceAngle);

                const largeArc = sliceAngle > Math.PI ? 1 : 0;

                const pathD = `
                    M ${x1} ${y1}
                    A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2}
                    L ${ix2} ${iy2}
                    A ${innerRadius} ${innerRadius} 0 ${largeArc} 0 ${ix1} ${iy1}
                    Z
                `;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", pathD);
                path.setAttribute("fill", asset.c);
                path.setAttribute("class", "slice");
                svg.appendChild(path);

                // Draw Logo in Slice
                if (sliceAngle > 0.1) {
                    const logoRadius = innerRadius + (radius - innerRadius) / 2;
                    const lx = cx + logoRadius * Math.cos(midAngle);
                    const ly = cy + logoRadius * Math.sin(midAngle);
                    
                    if (asset.l) {
                        const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                        img.setAttribute("href", asset.l);
                        img.setAttribute("x", lx - 15);
                        img.setAttribute("y", ly - 15);
                        img.setAttribute("width", "30");
                        img.setAttribute("height", "30");
                        img.style.filter = "drop-shadow(0 2px 4px rgba(0,0,0,0.2))";
                        svg.appendChild(img);
                    } else {
                        const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
                        txt.setAttribute("x", lx);
                        txt.setAttribute("y", ly);
                        txt.setAttribute("text-anchor", "middle");
                        txt.setAttribute("dominant-baseline", "middle");
                        txt.setAttribute("fill", "white");
                        txt.setAttribute("font-size", "10");
                        txt.setAttribute("font-weight", "bold");
                        txt.textContent = asset.s.substring(0, 4);
                        svg.appendChild(txt);
                    }
                }

                // Draw Labels & Guidelines
                const lineStartRadius = radius + 5;
                const lineEndRadius = radius + 40;
                
                const lx1 = cx + lineStartRadius * Math.cos(midAngle);
                const ly1 = cy + lineStartRadius * Math.sin(midAngle);
                const lx2 = cx + lineEndRadius * Math.cos(midAngle);
                const ly2 = cy + lineEndRadius * Math.sin(midAngle);
                
                const isRight = Math.cos(midAngle) > 0;
                const flatX = isRight ? lx2 + 40 : lx2 - 40;

                const poly = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
                poly.setAttribute("points", `${lx1},${ly1} ${lx2},${ly2} ${flatX},${ly2}`);
                svg.appendChild(poly);

                // Ticker Text
                const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t1.setAttribute("x", isRight ? flatX + 8 : flatX - 8);
                t1.setAttribute("y", ly2 - 4);
                t1.setAttribute("text-anchor", isRight ? "start" : "end");
                t1.setAttribute("font-weight", "bold");
                t1.setAttribute("font-size", "14");
                t1.setAttribute("fill", "#1e293b");
                t1.textContent = asset.s;
                svg.appendChild(t1);

                // Percent Text
                const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t2.setAttribute("x", isRight ? flatX + 8 : flatX - 8);
                t2.setAttribute("y", ly2 + 14);
                t2.setAttribute("text-anchor", isRight ? "start" : "end");
                t2.setAttribute("font-size", "12");
                t2.setAttribute("fill", "#64748b");
                t2.textContent = Math.round((asset.v / total) * 100) + "%";
                svg.appendChild(t2);

                currentAngle += sliceAngle;
            });
        }

        function downloadChart() {
            // Sederhana: Karena browser tidak bisa simpan SVG kompleks ke PNG langsung tanpa library eksternal,
            // cara terbaik untuk user adalah melakukan screenshot. 
            // Namun saya sediakan print mode yang rapi.
            window.print();
        }

        init();
    </script>
</body>
</html>
