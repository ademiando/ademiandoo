<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portfolio Pro Builder - Buffett Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #fcfcfc;
            color: #111;
        }
        
        #canvas-area {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        svg {
            overflow: visible;
        }

        .slice {
            transition: all 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            stroke: #fff;
            stroke-width: 2;
        }

        .no-spinner::-webkit-inner-spin-button,
        .no-spinner::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .img-placeholder {
            background-color: #f1f5f9;
            border: 1px solid #e2e8f0;
        }

        input[type=range] {
            height: 4px;
            -webkit-appearance: none;
            background: #e2e8f0;
            border-radius: 10px;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #000;
            cursor: pointer;
        }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- PANEL KONTROL MINIMALIS -->
    <aside class="w-full md:w-[400px] bg-white border-r border-slate-100 flex flex-col h-[40%] md:h-full z-30 shadow-sm">
        <div class="p-8 border-b border-slate-50">
            <h1 class="text-2xl font-black tracking-tighter mb-1">PRO BUILDER</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Sistem Alokasi Portofolio</p>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-6" id="asset-list">
            <!-- Items rendered via JS -->
        </div>

        <div class="p-8 bg-slate-50/50 space-y-4">
            <button onclick="addAsset()" class="w-full py-4 bg-black text-white rounded-xl font-bold text-xs tracking-widest hover:bg-slate-800 transition shadow-lg active:scale-95">
                + TAMBAH ASET
            </button>
            <div class="flex justify-between items-center px-1">
                <button onclick="resetData()" class="text-[10px] font-bold text-slate-300 hover:text-red-500 uppercase tracking-widest">Reset</button>
                <span class="text-[10px] font-bold text-slate-300 uppercase italic">Auto-Balance 100%</span>
            </div>
        </div>
    </aside>

    <!-- AREA VISUALISASI PROFESIONAL -->
    <main class="flex-1 relative flex flex-col items-center justify-between p-12">
        
        <div class="w-full max-w-5xl flex-1 flex flex-col items-center justify-center relative">
            
            <div id="canvas-area" class="relative w-full h-full flex items-center justify-center">
                <!-- SVG GRAFIK -->
                <svg id="chart-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" class="w-full h-full max-w-2xl">
                    <!-- Digambar via JS -->
                </svg>

                <!-- PUSAT DONUT (FOTO) -->
                <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
                    <div onclick="document.getElementById('profile-input').click()" class="w-32 h-32 md:w-52 md:h-52 rounded-full bg-white p-2 shadow-[0_20px_50px_rgba(0,0,0,0.1)] cursor-pointer hover:scale-105 transition-transform duration-700 overflow-hidden">
                        <div id="img-container" class="w-full h-full rounded-full overflow-hidden img-placeholder flex items-center justify-center">
                            <img id="profile-img" class="w-full h-full object-cover hidden">
                            <svg id="cam-icon" class="w-6 h-6 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        </div>
                    </div>
                </div>
            </div>

            <input type="file" id="profile-input" class="hidden" accept="image/*" onchange="handleImage(event)">

            <!-- KETERANGAN HOLDING (BAWAH) -->
            <div class="mt-12 text-center opacity-80">
                <div class="flex flex-col items-center">
                    <p class="text-[11px] font-bold text-slate-400 uppercase tracking-[0.5em] mb-3">Total Holdings Analysis</p>
                    <div class="h-px w-12 bg-slate-200 mb-4"></div>
                    <h2 class="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter">ALOKASI 100%</h2>
                </div>
            </div>
            
        </div>
    </main>

    <script>
        // TradingView Logo Service
        function getLogo(ticker) {
            ticker = ticker.toUpperCase().trim();
            if (ticker === 'BTC' || ticker === 'ETH') return `https://s3-symbol.tradingview.com/crypto/X-${ticker}.svg`;
            return `https://s3-symbol.tradingview.com/symbol/${ticker}.svg`;
        }

        // Data Awal (Referansi Buffett)
        let assets = [
            { t: "AAPL", v: 38, c: "#222222" },
            { t: "BAC", v: 22, c: "#0047bb" },
            { t: "AXP", v: 18, c: "#007bc1" },
            { t: "KO", v: 12, c: "#fe001a" },
            { t: "OTHER", v: 10, c: "#64748b" }
        ];

        function init() {
            renderList();
            drawChart();
        }

        // Smart Allocation: Satu berubah, sisanya menyesuaikan proporsional
        function adjust(index, newVal) {
            newVal = Math.max(1, Math.min(96, newVal));
            const diff = newVal - assets[index].v;
            const othersSum = assets.reduce((s, a, i) => i !== index ? s + a.v : s, 0);
            
            assets[index].v = newVal;
            assets.forEach((a, i) => {
                if (i !== index) {
                    const ratio = a.v / othersSum;
                    a.v -= diff * ratio;
                }
            });

            // Normalisasi pembulatan
            const total = assets.reduce((s, a) => s + a.v, 0);
            if (total !== 100) {
                const adj = (100 - total) / (assets.length - 1);
                assets.forEach((a, i) => { if (i !== index) a.v += adj; });
            }

            renderList();
            drawChart();
        }

        function renderList() {
            const container = document.getElementById('asset-list');
            container.innerHTML = '';
            assets.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = "group space-y-3";
                div.innerHTML = `
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg relative overflow-hidden bg-slate-50 border border-slate-100 flex items-center justify-center">
                                <input type="color" value="${item.c}" oninput="assets[${i}].c = this.value; drawChart();" class="absolute inset-0 opacity-0 cursor-pointer">
                                <img src="${getLogo(item.t)}" class="w-full h-full object-contain p-2" onerror="this.style.opacity='0'">
                                <div class="absolute inset-0 pointer-events-none" style="background-color:${item.c}; opacity: 0.05"></div>
                            </div>
                            <input type="text" value="${item.t}" onchange="assets[${i}].t = this.value.toUpperCase(); renderList(); drawChart();" class="font-black text-sm tracking-tight bg-transparent outline-none w-20 uppercase">
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="text-sm font-bold text-slate-400">${Math.round(item.v)}%</span>
                            <button onclick="removeAsset(${i})" class="opacity-0 group-hover:opacity-100 transition text-[9px] font-bold text-red-400 uppercase">Hapus</button>
                        </div>
                    </div>
                    <input type="range" min="1" max="96" step="0.1" value="${item.v}" oninput="adjust(${i}, parseFloat(this.value))" class="w-full">
                `;
                container.appendChild(div);
            });
        }

        function addAsset() {
            const share = 100 / (assets.length + 1);
            assets.forEach(a => a.v = (100 - share) * (a.v / 100));
            assets.push({ t: "TICKER", v: share, c: "#94a3b8" });
            renderList();
            drawChart();
        }

        function removeAsset(i) {
            if (assets.length <= 1) return;
            const val = assets[i].v;
            assets.splice(i, 1);
            const factor = 100 / (100 - val);
            assets.forEach(a => a.v *= factor);
            renderList();
            drawChart();
        }

        function resetData() {
            assets = [
                { t: "AAPL", v: 40, c: "#000000" },
                { t: "BBCA", v: 30, c: "#003594" },
                { t: "OTHER", v: 30, c: "#e2e8f0" }
            ];
            renderList();
            drawChart();
        }

        function handleImage(e) {
            const file = e.target.files[0];
            if (file) {
                const r = new FileReader();
                r.onload = (ex) => {
                    const img = document.getElementById('profile-img');
                    img.src = ex.target.result;
                    img.classList.remove('hidden');
                    document.getElementById('cam-icon').classList.add('hidden');
                };
                r.readAsDataURL(file);
            }
        }

        function drawChart() {
            const svg = document.getElementById('chart-svg');
            svg.innerHTML = '';
            const cx = 400, cy = 300;
            const radius = 250; 
            const innerRadius = 110; // KETEBALAN MASIF (FAT DONUT)
            
            let angle = -Math.PI / 2;

            assets.forEach((asset, i) => {
                const slice = (asset.v / 100) * 2 * Math.PI;
                if (slice <= 0) return;

                const mid = angle + (slice / 2);
                
                // Paths
                const x1 = cx + radius * Math.cos(angle);
                const y1 = cy + radius * Math.sin(angle);
                const x2 = cx + radius * Math.cos(angle + slice);
                const y2 = cy + radius * Math.sin(angle + slice);
                const ix1 = cx + innerRadius * Math.cos(angle);
                const iy1 = cy + innerRadius * Math.sin(angle);
                const ix2 = cx + innerRadius * Math.cos(angle + slice);
                const iy2 = cy + innerRadius * Math.sin(angle + slice);

                const large = slice > Math.PI ? 1 : 0;
                const d = `M ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${innerRadius} ${innerRadius} 0 ${large} 0 ${ix1} ${iy1} Z`;

                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                p.setAttribute("d", d);
                p.setAttribute("fill", asset.c);
                p.setAttribute("class", "slice");
                svg.appendChild(p);

                // Logo di tengah irisan (Buffett Style)
                if (slice > 0.15) {
                    const lr = innerRadius + (radius - innerRadius) / 2;
                    const lx = cx + lr * Math.cos(mid);
                    const ly = cy + lr * Math.sin(mid);
                    const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                    img.setAttribute("href", getLogo(asset.t));
                    img.setAttribute("x", lx - 22);
                    img.setAttribute("y", ly - 22);
                    img.setAttribute("width", "44");
                    img.setAttribute("height", "44");
                    img.setAttribute("style", "filter: drop-shadow(0 4px 10px rgba(0,0,0,0.15))");
                    img.onerror = function() { this.style.display = 'none'; };
                    svg.appendChild(img);
                }

                // Label & Garis (Gaya Minimalis Bersih)
                const l1 = radius + 10;
                const l2 = radius + 40;
                const lx1 = cx + l1 * Math.cos(mid);
                const ly1 = cy + l1 * Math.sin(mid);
                const lx2 = cx + l2 * Math.cos(mid);
                const ly2 = cy + l2 * Math.sin(mid);
                const isR = Math.cos(mid) > 0;
                const fx = isR ? lx2 + 30 : lx2 - 30;

                const poly = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
                poly.setAttribute("points", `${lx1},${ly1} ${lx2},${ly2} ${fx},${ly2}`);
                poly.setAttribute("fill", "none");
                poly.setAttribute("stroke", "#eee");
                poly.setAttribute("stroke-width", "1.5");
                svg.appendChild(poly);

                const t1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t1.setAttribute("x", isR ? fx + 10 : fx - 10);
                t1.setAttribute("y", ly2 - 6);
                t1.setAttribute("text-anchor", isR ? "start" : "end");
                t1.setAttribute("font-weight", "900");
                t1.setAttribute("font-size", "18");
                t1.setAttribute("fill", "#000");
                t1.textContent = asset.t;
                svg.appendChild(t1);

                const t2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
                t2.setAttribute("x", isR ? fx + 10 : fx - 10);
                t2.setAttribute("y", ly2 + 14);
                t2.setAttribute("text-anchor", isR ? "start" : "end");
                t2.setAttribute("font-size", "12");
                t2.setAttribute("font-weight", "600");
                t2.setAttribute("fill", "#999");
                t2.textContent = Math.round(asset.v) + "%";
                svg.appendChild(t2);

                angle += slice;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
